<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo branco -->
  <rect width="512" height="512" fill="#ffffff"/>
  <!-- Grupo principal laranja Headcout -->
  <g fill="#FF6B1A">
    <!-- Cabeça esquerda -->
    <circle cx="128" cy="100" r="52"/>
    <!-- Corpo esquerdo -->
    <rect x="80" y="165" width="96" height="200" rx="20"/>
    <!-- Braço esquerdo estendido -->
    <path d="M176 220 Q230 255 256 270" stroke="#FF6B1A" stroke-width="28" fill="none" stroke-linecap="round"/>

    <!-- Cabeça direita -->
    <circle cx="384" cy="100" r="52"/>
    <!-- Corpo direito -->
    <rect x="336" y="165" width="96" height="200" rx="20"/>
    <!-- Braço direito estendido -->
    <path d="M336 220 Q282 255 256 270" stroke="#FF6B1A" stroke-width="28" fill="none" stroke-linecap="round"/>

    <!-- Figura central (menor - gerente/coordenador) -->
    <circle cx="256" cy="200" r="40"/>
    <!-- Corpo central -->
    <rect x="220" y="252" width="72" height="140" rx="16"/>

    <!-- Engrenagem central -->
    <circle cx="256" cy="320" r="38" fill="#ffffff"/>
    <circle cx="256" cy="320" r="22" fill="#FF6B1A"/>
    <circle cx="256" cy="320" r="10" fill="#ffffff"/>
    <!-- Dentes da engrenagem -->
    <rect x="248" y="278" width="16" height="16" rx="3" fill="#FF6B1A"/>
    <rect x="248" y="346" width="16" height="16" rx="3" fill="#FF6B1A"/>
    <rect x="214" y="312" width="16" height="16" rx="3" fill="#FF6B1A"/>
    <rect x="282" y="312" width="16" height="16" rx="3" fill="#FF6B1A"/>
    <rect x="221" y="287" width="16" height="16" rx="3" fill="#FF6B1A" transform="rotate(45 229 295)"/>
    <rect x="275" y="287" width="16" height="16" rx="3" fill="#FF6B1A" transform="rotate(45 283 295)"/>
    <rect x="221" y="337" width="16" height="16" rx="3" fill="#FF6B1A" transform="rotate(45 229 345)"/>
    <rect x="275" y="337" width="16" height="16" rx="3" fill="#FF6B1A" transform="rotate(45 283 345)"/>
  </g>
</svg>